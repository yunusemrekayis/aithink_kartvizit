  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

per:#ffffff;\n    --paper-soft:#f7f8fb;\n  }\n  *{box-sizing:border-box;}\n  html,body{margin:0;padding:0;}\n  body{\n    font-family:'Inter','Helvetica Neue',Arial,sans-serif;\n    -webkit-font-smoothing:antialiased;\n    background:#eceef3;\n    color:var(--ink);\n    min-height:100vh;\n  }\n\n  .page{max-width:1240px;margin:0 auto;padding:64px 40px 90px;}\n  .head{margin-bottom:46px;}\n  .head h1{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:600;margin:0;letter-spacing:-.01em;}\n  .head p{margin:8px 0 0;color:var(--muted);font-size:15px;}\n\n  .group{margin-bottom:72px;}\n  .group .label{\n    display:flex;align-items:center;gap:14px;margin-bottom:26px;\n    font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);font-weight:600;\n  }\n  .group .label::after{content:\"\";flex:1;height:1px;background:#d7dbe4;}\n\n  .pair{display:flex;gap:40px;flex-wrap:wrap;}\n  .stack{display:flex;flex-direction:column;gap:12px;}\n  .face-label{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:600;padding-left:4px;}\n\n  /* ---------- Card shell ---------- */\n  .card{\n    width:560px;height:320px;position:relative;overflow:hidden;\n    border-radius:20px;\n    box-shadow:0 22px 50px -18px rgba(20,30,60,.32), 0 4px 14px rgba(20,30,60,.10);\n  }\n  .card.light{background:var(--paper);color:var(--ink);}\n  .card.dark{background:radial-gradient(120% 150% at 82% -15%, #1a2f6b 0%, var(--navy) 55%, #050c1e 100%);color:#eef2fb;}\n\n  .dots{position:absolute;inset:0;pointer-events:none;\n    background-image:radial-gradient(currentColor 1px, transparent 1.3px);\n    background-size:26px 26px;opacity:.06;}\n\n  /* ===== FRONT — light ===== */\n  .f1{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:22px;}\n  .f1 .logo{width:340px;height:auto;display:block;}\n  .f1 .rule{width:52px;height:3px;border-radius:3px;background:var(--brand);}\n  .f1 .tag{font-size:12px;letter-spacing:.4em;text-transform:uppercase;color:var(--brand-deep);font-weight:600;padding-left:.4em;}\n  .band{position:absolute;left:0;right:0;height:8px;background:linear-gradient(90deg,var(--brand-deep),var(--brand) 55%,var(--brand-cyan));}\n  .band.top{top:0;}\n  .band.bottom{bottom:0;}\n\n  /* ===== BACK — light ===== */\n  .b1{display:flex;height:100%;}\n  .b1 .side{width:196px;flex:none;position:relative;\n    background:radial-gradient(135% 130% at 18% 8%, #2a4fb8 0%, var(--brand-deep) 50%, #102873 100%);\n    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;overflow:hidden;}\n  .b1 .side .sdots{position:absolute;inset:0;background-image:radial-gradient(#ffffff 1px,transparent 1.3px);background-size:24px 24px;opacity:.10;}\n  .b1 .side img{width:104px;height:auto;position:relative;}\n  .b1 .side .wm{position:relative;font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;letter-spacing:.16em;color:#fff;}\n  .b1 .side .wm span{color:#bcd4ff;}\n  .b1 .body{flex:1;padding:34px 30px 30px 34px;display:flex;flex-direction:column;}\n  .b1 .nm{font-family:'Space Grotesk',sans-serif;font-size:27px;font-weight:600;letter-spacing:-.01em;line-height:1.06;color:var(--ink);}\n  .b1 .role{margin-top:7px;font-size:11px;color:var(--brand-deep);font-weight:600;letter-spacing:.16em;text-transform:uppercase;}\n  .b1 .sep{height:1px;background:var(--line);margin:18px 0 16px;}\n  .rows{display:flex;flex-direction:column;gap:13px;}\n  .row{display:flex;align-items:center;gap:13px;}\n  .ic{width:30px;height:30px;flex:none;border-radius:9px;display:flex;align-items:center;justify-content:center;\n     background:var(--paper-soft);border:1px solid var(--line);color:var(--brand);}\n  .ic svg{width:15px;height:15px;}\n  .rtext{font-size:13px;color:#26303f;line-height:1.32;}\n  .rtext .lbl{display:block;font-size:8.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:2px;font-weight:600;}\n\n  /* ===== FRONT — dark ===== */\n  .f2{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:18px;position:relative;}\n  .f2 .badge{width:120px;height:auto;filter:drop-shadow(0 12px 26px rgba(40,90,220,.5));}\n  .f2 .wm{font-family:'Space Grotesk',sans-serif;font-size:34px;font-weight:700;letter-spacing:.1em;color:#fff;line-height:1;}\n  .f2 .wm span{color:var(--brand-cyan);}\n  .f2 .rule{width:56px;height:3px;border-radius:3px;background:var(--brand-cyan);}\n  .f2 .tag{font-size:11px;letter-spacing:.4em;text-transform:uppercase;color:#9fb8e8;font-weight:500;padding-left:.4em;}\n\n  /* ===== BACK — dark ===== */\n  .b2{height:100%;padding:34px 34px 30px;display:flex;flex-direction:column;position:relative;}\n  .b2 .topbar{display:flex;align-items:center;gap:13px;}\n  .b2 .topbar img{width:42px;height:auto;}\n  .b2 .topbar .wm{font-family:'Space Grotesk',sans-serif;font-size:17px;font-weight:700;letter-spacing:.14em;color:#fff;}\n  .b2 .topbar .wm span{color:var(--brand-cyan);}\n  .b2 .nm{margin-top:auto;font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:600;color:#fff;letter-spacing:-.01em;}\n  .b2 .role{margin-top:6px;font-size:11px;color:var(--brand-cyan);font-weight:600;letter-spacing:.16em;text-transform:uppercase;}\n  .b2 .sep{height:1px;background:rgba(160,185,235,.22);margin:16px 0 15px;}\n  .b2 .rows{gap:12px;}\n  .b2 .ic{background:rgba(77,166,255,.12);border:1px solid rgba(120,165,240,.28);color:var(--brand-cyan);}\n  .b2 .rtext{color:#d6e0f5;}\n  .b2 .rtext .lbl{color:#8aa0cc;}\n  .b2 .gband{position:absolute;right:0;top:0;bottom:0;width:6px;background:linear-gradient(180deg,var(--brand-cyan),var(--brand-deep));}\n\n  @media print{\n    body{background:#fff;}\n    .page{padding:0;}\n    .head,.group .label,.face-label{display:none;}\n    .group{margin:0;page-break-inside:avoid;}\n    .card{box-shadow:none;}\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n  \n  <div class=\"page\">\n    <div class=\"head\">\n      <h
